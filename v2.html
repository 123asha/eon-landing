<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EON — вариант 2</title>
<style>
  /* ── фирменные шрифты ── */
  @font-face {
    font-family: 'TT Firs Neue';
    src: url('fonts/TTFirsNeue-Light.woff2') format('woff2'),
         url('fonts/TTFirsNeue-Light.woff') format('woff'),
         url('fonts/TTFirsNeue-Light.ttf') format('truetype');
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'TT Firs Neue';
    src: url('fonts/TTFirsNeue-Medium.woff2') format('woff2'),
         url('fonts/TTFirsNeue-Medium.woff') format('woff'),
         url('fonts/TTFirsNeue-Medium.ttf') format('truetype');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Geologica';
    src: url('fonts/Geologica-Variable.ttf') format('truetype');
    font-weight: 100 900; font-style: normal; font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  a { outline: none; }                 /* без браузерных обводок при тапе/фокусе */
  a:focus, a:focus-visible { outline: none; }
  html, body { height: 100%; overflow: hidden; background: #022121; }
  canvas { display: block; width: 100vw; height: 100vh; }

  .overlay {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
    font-family: 'TT Firs Neue', 'Geologica', system-ui, sans-serif;
    font-weight: 300;
    color: #F2F1F0;
  }

  /* ── композиция мезона: строгая центральная ось, воздух, мягкие фейды ── */
  .center {
    position: absolute; top: 45%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }

  .logo-wrap { opacity: 0; animation: fadeIn 1.6s ease .3s forwards; }
  .logo { width: clamp(160px, 16vw, 308px); height: auto; display: block; }

  /* три слова — трекинг-капс в одну строку, появляются по одному */
  .words {
    margin-top: 2.8rem;
    display: flex; align-items: center;
    font-size: clamp(.78rem, 1vw, 1.2rem);
    letter-spacing: .32em; text-transform: uppercase;
    white-space: nowrap;
  }
  .word, .sep { opacity: 0; animation: fadeIn 1.1s ease forwards; }
  .word:nth-child(1) { animation-delay: .9s; }
  .sep:nth-child(2)  { animation-delay: 1.35s; }
  .word:nth-child(3) { animation-delay: 1.5s; }
  .sep:nth-child(4)  { animation-delay: 1.95s; }
  .word:nth-child(5) { animation-delay: 2.1s; }
  .sep {
    width: 3px; height: 3px; border-radius: 50%;
    background: #FF662A;
    margin: 0 1.6em 0 1.28em;   /* компенсация трекинга справа от слова */
    flex: none;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .cta {
    margin-top: 4.2rem;
    font-size: clamp(.68rem, .8vw, .96rem);
    text-transform: uppercase; letter-spacing: .18em;
    color: #F2F1F0; text-decoration: none;
    border-bottom: 1px solid rgba(242,241,240,.45);
    padding-bottom: .55rem;
    pointer-events: auto;
    transition: border-color .3s, opacity .3s;
    -webkit-tap-highlight-color: transparent;
    opacity: 0; animation: fadeIn 1.4s ease 2.7s forwards;
  }
  @media (hover: hover) {
    .cta:hover { border-color: #F2F1F0; opacity: .8 !important; }
  }
  .cta:active, .cta.is-tap { border-color: #F2F1F0; }

  /* адрес — внизу по центру, на оси; клик открывает Яндекс.Карты */
  .address {
    position: absolute; bottom: 2.4rem; left: 50%;
    transform: translateX(-50%);
    font-size: clamp(.8rem, .9vw, 1.06rem);
    letter-spacing: .02em; white-space: nowrap;
    color: inherit; text-decoration: none;
    pointer-events: auto; cursor: pointer;
    transition: opacity .3s;
    -webkit-tap-highlight-color: transparent;
    opacity: 0; animation: fadeIn 1.4s ease 3s forwards;
  }
  @media (hover: hover) { .address:hover { opacity: .75 !important; } }
  .address .label {
    opacity: .55; margin-right: .55em;
    font-size: .8em; text-transform: uppercase; letter-spacing: .08em;
  }

  /* на мобилке слова остаются в одну строку — компактнее кегль и разрядка */
  @media (max-width: 700px) {
    .words { font-size: .6rem; letter-spacing: .14em; }
    .sep { width: 2px; height: 2px; margin: 0 .9em 0 .76em; }
  }

  @media (prefers-reduced-motion: reduce) {
    .word, .sep, .cta, .logo-wrap, .address { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="overlay">
  <div class="center">
    <div class="logo-wrap">
      <svg class="logo" viewBox="0 0 170 38" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="EON">
        <path d="M37.7773 6.31836H6.2959V12.6357H37.7773V18.9561H6.2959V31.5918H37.7773V37.9092H0V0H37.7773V6.31836ZM125.927 37.9092H44.0752V0H125.927V37.9092ZM151.11 0V31.5918H163.704V0H170V37.9092H144.814V6.31836H138.518V37.9092H132.222V0H151.11ZM50.3711 31.5918H119.631V6.31836H50.3711V31.5918Z" fill="#F2F1F0"/>
      </svg>
    </div>

    <div class="words">
      <span class="word">Безупречность</span><span class="sep"></span><span class="word">Стиль</span><span class="sep"></span><span class="word">Приватность</span>
    </div>

    <a class="cta" href="#">Стать гостем открытия</a>
  </div>

  <a class="address" href="https://yandex.ru/maps/?text=%D0%9C%D0%B8%D0%BD%D1%81%D0%BA%2C%20%D1%83%D0%BB.%20%D0%92%D0%BE%D0%BB%D0%BE%D0%B4%D0%B0%D1%80%D1%81%D0%BA%D0%BE%D0%B3%D0%BE%2C%2021" target="_blank" rel="noopener"><span class="label">Адрес:</span>Минск, ул. Володарского, 21</a>
</div>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', {
  antialias: false,
  depth: false, stencil: false,
  alpha: false,
  powerPreference: 'low-power'
});

const vert = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const frag = `
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;
uniform float uReveal;
uniform float uOrange;

vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}
vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865,0.366025403,-0.577350269,0.024390243);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m; m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0;
  vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5);
  vec3 a0=x-ox;
  m*=1.79284291-0.85373472*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}
float fbm(vec2 p){
  float s=0.0, a=0.5;
  for(int i=0;i<4;i++){ s+=a*snoise(p); p*=2.0; a*=0.5; }
  return s;
}

void main(){
  vec2 uv = gl_FragCoord.xy / uRes.xy;
  vec2 p  = uv;
  p.x *= uRes.x / uRes.y;
  p *= 0.1;
  float t = (uTime + 100.0) * 0.01;

  vec2 q = vec2(fbm(p + t), fbm(p - t + 4.0));
  vec2 r = vec2(fbm(p + q + uMouse*0.6 + 1.7),
                fbm(p + q - uMouse*0.6 + 9.2));
  float n = fbm(p + r);

  vec3 c1 = vec3(0.008,0.129,0.129); // #022121 — тёмная база
  vec3 c2 = vec3(0.030,0.220,0.190); // глубокий тил
  vec3 c3 = vec3(1.000,0.400,0.165); // #FF662A — оранжевый акцент
  vec3 c4 = vec3(0.090,0.380,0.320); // изумруд (блики)

  vec3 colBase = mix(c1, c2, smoothstep(0.0,0.6,n));
  colBase = mix(colBase, c4, smoothstep(0.4,0.9,length(r)*0.5));
  colBase *= 0.9;
  colBase *= 1.0 - 0.35*length(uv-0.5);

  vec3 base  = vec3(0.008, 0.129, 0.129);
  float fld  = fbm(uv * 2.0 + 12.0);
  float mask = uv.y + fld * 0.10;
  float edge = 0.16;
  float revealed = 1.0 - smoothstep(uReveal - edge, uReveal + edge, mask);
  vec3 col = mix(base, colBase, revealed);

  float peak = smoothstep(0.45, 0.80, n);
  col = mix(col, c3, peak * uOrange * 0.55);   // сдержанный акцент

  col += (fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453)-0.5)/255.0;
  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uRes    = gl.getUniformLocation(prog, 'uRes');
const uTime   = gl.getUniformLocation(prog, 'uTime');
const uMouse  = gl.getUniformLocation(prog, 'uMouse');
const uReveal = gl.getUniformLocation(prog, 'uReveal');
const uOrange = gl.getUniformLocation(prog, 'uOrange');

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let t0 = null;
const REVEAL_DELAY = 0.3;
const REVEAL_DUR   = 3.4;
const ORANGE_DELAY = 0.2;
const ORANGE_DUR   = 0.8;

const ctaEl = document.querySelector('.cta');
ctaEl.addEventListener('click', (e) => {
  e.preventDefault();
  ctaEl.classList.toggle('is-tap');
});

let mouse = [0, 0], target = [0, 0];
function aim(x, y){ target = [x/innerWidth - 0.5, 0.5 - y/innerHeight]; }
addEventListener('mousemove', e => aim(e.clientX, e.clientY));
addEventListener('touchstart', e => { const t = e.touches[0]; if (t) aim(t.clientX, t.clientY); }, {passive:true});
addEventListener('touchmove',  e => { const t = e.touches[0]; if (t) aim(t.clientX, t.clientY); }, {passive:true});

function resize(){
  const q = 0.6;
  canvas.width  = Math.max(1, Math.round(innerWidth  * q));
  canvas.height = Math.max(1, Math.round(innerHeight * q));
  gl.viewport(0, 0, canvas.width, canvas.height);
}
addEventListener('resize', resize); resize();

function loop(ms){
  if (t0 === null) t0 = ms;
  const elapsed = (ms - t0) / 1000;
  let p01 = reduceMotion ? 1.0 : (elapsed - REVEAL_DELAY) / REVEAL_DUR;
  p01 = Math.max(0.0, Math.min(1.0, p01));
  const reveal = p01 * 1.65 - 0.35;

  let orange = reduceMotion ? 1.0 : (elapsed - ORANGE_DELAY) / ORANGE_DUR;
  orange = Math.max(0.0, Math.min(1.0, orange));

  mouse[0] += (target[0]-mouse[0])*0.05;
  mouse[1] += (target[1]-mouse[1])*0.05;
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, ms*0.001);
  gl.uniform2f(uMouse, mouse[0], mouse[1]);
  gl.uniform1f(uReveal, reveal);
  gl.uniform1f(uOrange, orange);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
